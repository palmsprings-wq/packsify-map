<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packsify — Ownership Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0b; --surface: #161614; --surface2: #1e1e1b; --surface3: #252521;
  --border: rgba(255,255,255,0.06); --border-md: rgba(255,255,255,0.11); --border-hi: rgba(255,255,255,0.18);
  --text: #e4e2d8; --text-2: #9b9890; --text-3: #555350;
  --sara: #1a9970; --sara-bg: rgba(26,153,112,0.12); --sara-bd: rgba(26,153,112,0.32); --sara-lt: #8dd8b8;
  --stefan: #7b72d8; --stefan-bg: rgba(123,114,216,0.12); --stefan-bd: rgba(123,114,216,0.32); --stefan-lt: #c4c0f4;
  --shared: #d98f1e; --shared-bg: rgba(217,143,30,0.10); --shared-bd: rgba(217,143,30,0.28); --shared-lt: #f0b84a;
  --gap: #c94e28; --gap-bg: rgba(201,78,40,0.10); --gap-bd: rgba(201,78,40,0.28); --gap-lt: #e8845a;
  --none-bg: rgba(80,80,74,0.18); --none-bd: rgba(100,100,94,0.28); --none-lt: #666460;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
.header { padding: 28px 40px 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.header h1 { font-size: 17px; font-weight: 500; letter-spacing: -0.2px; }
.header p  { font-size: 11px; color: var(--text-3); margin-top: 3px; font-family: 'DM Mono', monospace; }
.sync-pill { display: flex; align-items: center; gap: 7px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-3); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border-md); background: var(--surface); }
.sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); transition: background 0.3s; flex-shrink: 0; }
.sdot.live { background: var(--sara); box-shadow: 0 0 6px rgba(26,153,112,0.4); }
.sdot.err  { background: var(--gap); }
.sdot.spin { background: var(--shared); animation: blink 1s ease infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.35} }
.tabbar { display: flex; padding: 20px 40px 0; gap: 2px; border-bottom: 1px solid var(--border); margin-top: 20px; }
.tab { padding: 9px 18px; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; border: none; background: transparent; color: var(--text-3); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; display: flex; align-items: center; gap: 7px; border-radius: 6px 6px 0 0; }
.tab:hover { color: var(--text-2); background: var(--surface); }
.tab.ts.active { color: var(--sara-lt);   border-bottom-color: var(--sara); }
.tab.tt.active { color: var(--stefan-lt); border-bottom-color: var(--stefan); }
.tab.tc.active { color: var(--shared-lt); border-bottom-color: var(--shared); }
.tab.tb.active { color: var(--text-2);    border-bottom-color: var(--text-3); }
.tdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.badge { font-size: 9px; padding: 1px 6px; border-radius: 8px; background: var(--gap-bg); border: 1px solid var(--gap-bd); color: var(--gap-lt); }
.statusbar { padding: 12px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; background: var(--surface); }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2); font-family: 'DM Mono', monospace; }
.ldot { width: 7px; height: 7px; border-radius: 50%; }
.vsep { width: 1px; height: 13px; background: var(--border-md); }
.comp { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'DM Mono', monospace; }
.cbar { width: 56px; height: 3px; background: var(--border-md); border-radius: 2px; overflow: hidden; }
.cfill { height: 100%; border-radius: 2px; transition: width 0.35s ease; }
.pnote { margin-left: auto; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-3); }
.grid-wrap { padding: 20px 40px 0; overflow-x: auto; }
.grid { min-width: 880px; }
.col-hdrs { display: grid; grid-template-columns: 148px repeat(5,1fr); gap: 4px; margin-bottom: 4px; }
.ch { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--text-3); letter-spacing: 0.9px; text-transform: uppercase; text-align: center; padding: 0 4px 10px; border-bottom: 1px solid var(--border); }
.ch:first-child { text-align: left; border-bottom: none; }
.drow { display: grid; grid-template-columns: 148px repeat(5,1fr); gap: 4px; margin-bottom: 4px; align-items: stretch; animation: fadeUp 0.22s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)} }
.dlabel { display: flex; flex-direction: column; justify-content: center; padding: 8px 12px 8px 0; }
.dname { font-size: 13px; font-weight: 500; color: var(--text); }
.dsub  { font-size: 10px; color: var(--text-3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.cell { border-radius: 7px; border: 1px solid var(--border); padding: 9px 11px; min-height: 64px; display: flex; flex-direction: column; justify-content: center; gap: 2px; cursor: pointer; transition: border-color 0.12s, transform 0.12s; position: relative; background: var(--surface); user-select: none; }
.cell:hover:not(.locked) { border-color: var(--border-hi); transform: translateY(-1px); }
.cell.locked { cursor: default; }
.cell.o-sara   { background: var(--sara-bg);   border-color: var(--sara-bd); }
.cell.o-stefan { background: var(--stefan-bg); border-color: var(--stefan-bd); }
.cell.o-shared { background: var(--shared-bg); border-color: var(--shared-bd); }
.cell.o-none   { background: var(--none-bg);   border-color: var(--none-bd); opacity: 0.55; }
.cell.unset    { border-style: dashed; border-color: var(--border-hi); background: transparent; }
.cell.c-match  { background: rgba(26,153,112,0.08); border-color: rgba(26,153,112,0.22); }
.cell.c-diff   { background: var(--gap-bg); border-color: var(--gap-bd); }
.cell.c-empty  { background: var(--none-bg); border-color: var(--none-bd); opacity: 0.3; }
.c-own { font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; }
.o-sara .c-own   { color: var(--sara-lt); } .o-stefan .c-own { color: var(--stefan-lt); }
.o-shared .c-own { color: var(--shared-lt); } .o-none .c-own { color: var(--none-lt); }
.unset .c-own { color: var(--text-3); } .c-match .c-own { color: var(--sara-lt); }
.c-diff .c-own { color: var(--gap-lt); } .c-empty .c-own { color: var(--text-3); }
.c-desc { font-size: 10px; color: var(--text-2); line-height: 1.4; }
.c-sub  { font-size: 10px; color: var(--text-3); font-family: 'DM Mono', monospace; margin-top: 1px; }
.picker { position: absolute; bottom: 5px; right: 6px; display: flex; gap: 3px; opacity: 0; transition: opacity 0.12s; }
.cell:not(.locked):hover .picker { opacity: 1; }
.pdot { width: 7px; height: 7px; border-radius: 50%; cursor: pointer; transition: transform 0.1s; border: 1px solid rgba(255,255,255,0.12); }
.pdot:hover { transform: scale(1.5); }
.p-sara{background:var(--sara)}.p-stefan{background:var(--stefan)}.p-shared{background:var(--shared)}.p-none{background:var(--none-lt)}
.bottom { padding: 16px 40px 40px; }
.gap-box { margin-bottom: 14px; padding: 12px 16px; background: var(--gap-bg); border: 1px solid var(--gap-bd); border-radius: 8px; }
.gap-title { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--gap-lt); letter-spacing: 0.9px; text-transform: uppercase; margin-bottom: 8px; }
.gap-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.gtag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: rgba(201,78,40,0.12); border: 1px solid var(--gap-bd); color: var(--gap-lt); font-family: 'DM Mono', monospace; }
.bottom-row { display: flex; align-items: flex-start; gap: 12px; }
.notes-wrap { flex: 1; }
.nlbl { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--text-3); letter-spacing: 0.9px; text-transform: uppercase; margin-bottom: 6px; }
textarea { width: 100%; background: var(--surface); border: 1px solid var(--border-md); border-radius: 7px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; resize: none; line-height: 1.6; transition: border-color 0.15s; }
textarea:focus { border-color: var(--border-hi); }
textarea::placeholder { color: var(--text-3); }
textarea:disabled { opacity: 0.4; cursor: not-allowed; }
.dl-btn { display: none; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 7px; border: 1px solid var(--border-md); background: var(--surface2); color: var(--text-2); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.12s; white-space: nowrap; flex-shrink: 0; align-self: flex-end; }
.dl-btn:hover { background: var(--surface3); border-color: var(--border-hi); color: var(--text); }
.dl-btn.show { display: flex; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Packsify — CEO / COO ownership map</h1>
    <p>fill your tab · Stefan fills his · compare to find gaps</p>
  </div>
  <div class="sync-pill">
    <div class="sdot spin" id="sdot"></div>
    <span id="slbl">connecting</span>
  </div>
</div>

<div class="tabbar">
  <button class="tab ts active" id="t-sara"    onclick="setTab('sara')">   <div class="tdot" style="background:var(--sara)"></div>Sara's view</button>
  <button class="tab tt"        id="t-stefan"  onclick="setTab('stefan')"> <div class="tdot" style="background:var(--stefan)"></div>Stefan's view</button>
  <button class="tab tc"        id="t-compare" onclick="setTab('compare')"><div class="tdot" style="background:var(--shared)"></div>Compare<span class="badge" id="gc" style="display:none"></span></button>
  <button class="tab tb"        id="t-bench"   onclick="setTab('bench')">  <div class="tdot" style="background:var(--text-3)"></div>Benchmark</button>
</div>

<div class="statusbar">
  <div class="leg"><div class="ldot" style="background:var(--sara)"></div>Sara (COO)</div>
  <div class="leg"><div class="ldot" style="background:var(--stefan)"></div>Stefan (CEO)</div>
  <div class="leg"><div class="ldot" style="background:var(--shared)"></div>Shared</div>
  <div class="leg"><div class="ldot" style="background:var(--none-lt)"></div>Not involved</div>
  <div class="vsep"></div>
  <div class="comp"><span style="color:var(--sara-lt)">Sara</span><div class="cbar"><div class="cfill" id="bs" style="width:0%;background:var(--sara)"></div></div><span id="ps" style="color:var(--text-3)">0%</span></div>
  <div class="comp"><span style="color:var(--stefan-lt)">Stefan</span><div class="cbar"><div class="cfill" id="bst" style="width:0%;background:var(--stefan)"></div></div><span id="pst" style="color:var(--text-3)">0%</span></div>
  <div class="pnote" id="pnote">loading...</div>
</div>

<div class="grid-wrap"><div class="grid" id="grid"></div></div>

<div class="bottom">
  <div id="gapwrap"></div>
  <div class="bottom-row">
    <div class="notes-wrap">
      <div class="nlbl">Notes</div>
      <textarea id="notes" rows="3" placeholder="Notes, open questions..." oninput="scheduleNoteSave()"></textarea>
    </div>
    <button class="dl-btn" id="dl-btn" onclick="downloadCSV()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M3.5 5.5l3 3 3-3M1 10.5h11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      download results
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vlullhrupjifvfzqubhv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsdWxsaHJ1cGppZnZmenF1Ymh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzg2MTcsImV4cCI6MjA4ODkxNDYxN30.ocIZlSd-Vizz6XRABL9xbgkB79G7B3xGfWVNYh6NTps';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const OWN=['sara','stefan','shared','none'];
const LBL={sara:'Sara (COO)',stefan:'Stefan (CEO)',shared:'Shared',none:'Not involved'};
const DSC={sara:'COO leads',stefan:'CEO leads',shared:'Both involved',none:'Not needed'};
const COLS=['Direction','Day-to-day ops','Decisions','Escalations','Reports to'];
const DOMS=[
  {id:'growth',    name:'Growth',           sub:'Alisa Z, Nathalie',       bench:['stefan','stefan','stefan','stefan','stefan'],tips:['CEO sets acquisition strategy, channel bets, and growth targets.','Growth team runs under CEO or a dedicated Growth lead.','Growth budget and channel decisions sit with the CEO.','Growth team escalates to CEO.','Growth leads report to whoever owns strategy — typically CEO.']},
  {id:'product',   name:'IT / Product',     sub:'Aleksa',                   bench:['stefan','sara','sara','sara','sara'],        tips:['CEO owns product vision and roadmap direction.','COO as PO owns backlog, sprint delivery, and coordination.','Feature decisions sit with PO — big bets escalate to CEO.','Dev team escalates delivery to PO; product direction to CEO.','Dev team reports delivery to PO. Direction check-ins go to CEO.']},
  {id:'cs',        name:'Customer Support', sub:'Jelena, Alisa',            bench:['sara','sara','sara','sara','sara'],           tips:['COO owns CS standards, SLAs, and quality bar.','CS co-leads run day-to-day — COO sets direction.','COO owns CS policy decisions.','CS escalates to COO. CEO only for major crises.','CS leads report to COO. CEO sees summary when strategic.']},
  {id:'suppliers', name:'Suppliers',        sub:'SoS, Dahu networks',       bench:['shared','sara','sara','shared','sara'],       tips:['Supplier strategy is CEO+COO together.','COO manages supplier performance day-to-day.','Operational decisions belong to COO. New partnerships → CEO.','Major failures or renegotiations need CEO visibility.','Supplier performance flows to COO, who surfaces summaries to CEO.']},
  {id:'backoffice',name:'Back Office',      sub:'Payments, reconciliation', bench:['sara','sara','sara','sara','sara'],           tips:['COO owns back-office systems, processes, and financial ops.','Back office runs under COO day-to-day.','COO decides on tools, SOPs, and process changes.','Back office escalates to COO. High-stakes matters → CEO aware.','Back office reports to COO. CEO sees financial summaries only.']},
  {id:'hr',        name:'HR / People',      sub:'Hiring, culture, exits',   bench:['shared','sara','shared','sara','sara'],       tips:['People strategy is always CEO+COO together.','COO runs day-to-day HR: onboarding, performance, team health.','Hires and exits are shared — COO recommends, CEO co-decides.','Team issues escalate to COO. CEO for senior roles or culture crises.','HR surfaces to COO. CEO involved in senior hires and exits only.']},
  {id:'finance',   name:'Finance / P&L',    sub:'Revenue, costs, runway',   bench:['stefan','sara','shared','stefan','stefan'],   tips:['CEO owns financial strategy, fundraising, and investor relations.','COO manages operational P&L, cost control, and cash flow.','Budget decisions are shared — COO proposes, CEO approves.','Financial escalations go to CEO. COO surfaces with recommendations.','Finance results go to CEO. COO provides operational context.']},
  {id:'external',  name:'Partnerships',     sub:'Tencent, key deals',       bench:['stefan','stefan','stefan','stefan','stefan'], tips:['CEO leads all major external partnerships.','CEO manages key external relationships directly.','Partnership decisions belong to CEO. COO executes once agreed.','External partners escalate to CEO.','Partnership results flow directly to CEO.']}
];

let S={};
let notes_store={sara:'',stefan:''};
let tab='sara';
let noteTimer=null;
let pollTimer=null;

function initLocal(){
  DOMS.forEach(d=>{ S[d.id]={sara:Array(COLS.length).fill(null),stefan:Array(COLS.length).fill(null)}; });
}

function setSyncStatus(s,msg){
  document.getElementById('sdot').className='sdot '+s;
  document.getElementById('slbl').textContent=msg;
}

async function fetchData(){
  try{
    setSyncStatus('spin','syncing');
    const {data,error}=await sb.from('ownership_map').select('data').eq('id',1).maybeSingle();
    if(error) throw error;
    if(data&&data.data){
      const d=JSON.parse(data.data);
      DOMS.forEach(dom=>{
        if(d[dom.id]){
          if(d[dom.id].sara)   S[dom.id].sara=d[dom.id].sara;
          if(d[dom.id].stefan) S[dom.id].stefan=d[dom.id].stefan;
        }
      });
      if(d._notes) notes_store=d._notes;
      syncNoteField();
    }
    setSyncStatus('live','synced');
  }catch(e){
    setSyncStatus('err','sync error');
    console.error('fetchData:',e);
  }
}

async function pushData(){
  try{
    setSyncStatus('spin','saving');
    const d={_notes:notes_store};
    DOMS.forEach(dom=>{ d[dom.id]=S[dom.id]; });
    const {error}=await sb.from('ownership_map').upsert({id:1,data:JSON.stringify(d)},{onConflict:'id'});
    if(error) throw error;
    setSyncStatus('live','synced');
  }catch(e){
    setSyncStatus('err','save error');
    console.error('pushData:',e);
  }
}

function startPolling(){
  if(pollTimer) return;
  pollTimer=setInterval(async()=>{ if(tab!=='bench'){await fetchData();render();} },4000);
}

async function setOwner(domId,ci,owner){
  if(tab!=='sara'&&tab!=='stefan') return;
  S[domId][tab][ci]=S[domId][tab][ci]===owner?null:owner;
  render();
  await pushData();
}

function comp(key){
  const tot=DOMS.length*COLS.length;
  const f=DOMS.reduce((a,d)=>a+S[d.id][key].filter(v=>v!==null).length,0);
  return Math.round(f/tot*100);
}

function gapCount(){
  let n=0;
  DOMS.forEach(d=>COLS.forEach((_,i)=>{
    const sv=S[d.id].sara[i],stv=S[d.id].stefan[i];
    if(sv!==null&&stv!==null&&sv!==stv) n++;
  }));
  return n;
}

function setTab(t){
  tab=t;
  ['sara','stefan','compare','bench'].forEach(x=>document.getElementById('t-'+x).classList.toggle('active',x===t));
  document.getElementById('dl-btn').classList.toggle('show',t==='compare');
  syncNoteField();
  render();
}

function syncNoteField(){
  const el=document.getElementById('notes');
  if(!el) return;
  if(tab==='sara'||tab==='stefan'){
    el.value=notes_store[tab]||'';
    el.disabled=false;
    el.placeholder=tab==='sara'?"Sara — your view, assumptions, open questions...":"Stefan — your view, things you want to raise...";
  }else{
    el.value='';el.disabled=true;
    el.placeholder='Switch to Sara or Stefan tab to add notes.';
  }
}

function scheduleNoteSave(){
  if(tab!=='sara'&&tab!=='stefan') return;
  notes_store[tab]=document.getElementById('notes').value;
  clearTimeout(noteTimer);
  noteTimer=setTimeout(pushData,1200);
}

function downloadCSV(){
  const rows=[['Domain','Column','Sara','Stefan','Agree?']];
  DOMS.forEach(d=>COLS.forEach((col,i)=>{
    const sv =S[d.id].sara[i]   ?LBL[S[d.id].sara[i]]  :'unset';
    const stv=S[d.id].stefan[i] ?LBL[S[d.id].stefan[i]]:'unset';
    const agree=!S[d.id].sara[i]||!S[d.id].stefan[i]?'not filled':S[d.id].sara[i]===S[d.id].stefan[i]?'yes':'no';
    rows.push([d.name,col,sv,stv,agree]);
  }));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='packsify_ownership_compare.csv';
  a.click();
}

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const ps=comp('sara'),pst=comp('stefan');
  document.getElementById('bs').style.width=ps+'%';
  document.getElementById('bst').style.width=pst+'%';
  document.getElementById('ps').textContent=ps+'%';
  document.getElementById('pst').textContent=pst+'%';
  const gc=gapCount();
  const gcEl=document.getElementById('gc');
  gcEl.style.display=gc>0?'':'none';
  if(gc>0) gcEl.textContent=gc+' gap'+(gc>1?'s':'');
  const pn=document.getElementById('pnote');
  if(tab==='sara')       pn.textContent=ps<100?ps+'% done — share the link with Stefan when ready':'Done — share the link with Stefan';
  else if(tab==='stefan')pn.textContent=pst<100?pst+'% done — keep filling':'Done — open Compare tab together';
  else if(tab==='compare')pn.textContent=gc>0?gc+' disagreement'+(gc>1?'s':'')+' to discuss':'Full alignment';
  else                   pn.textContent='typical CEO/COO split at 20–50 person startups';

  const hrow=document.createElement('div');
  hrow.className='col-hdrs';
  hrow.innerHTML='<div class="ch" style="text-align:left"></div>'+COLS.map(c=>`<div class="ch">${c}</div>`).join('');
  grid.appendChild(hrow);

  DOMS.forEach((dom,di)=>{
    const row=document.createElement('div');
    row.className='drow';
    row.style.animationDelay=(di*0.035)+'s';
    row.innerHTML=`<div class="dlabel"><div class="dname">${dom.name}</div><div class="dsub">${dom.sub}</div></div>`;

    COLS.forEach((col,ci)=>{
      const cell=document.createElement('div');

      if(tab==='sara'||tab==='stefan'){
        const val=S[dom.id][tab][ci];
        if(val===null){
          cell.className='cell unset';
          cell.innerHTML=`<div class="c-own" style="color:var(--text-3)">— unset</div><div class="c-desc" style="color:var(--text-3)">click to assign</div>`;
        }else{
          cell.className=`cell o-${val}`;
          cell.innerHTML=`<div class="c-own">${LBL[val]}</div><div class="c-desc">${DSC[val]}</div>`;
        }
        const pk=document.createElement('div');
        pk.className='picker';
        OWN.forEach(o=>{
          const dot=document.createElement('div');
          dot.className=`pdot p-${o}`;
          dot.title=LBL[o];
          dot.addEventListener('click',e=>{e.stopPropagation();setOwner(dom.id,ci,o);});
          pk.appendChild(dot);
        });
        cell.appendChild(pk);
        cell.addEventListener('click',()=>{
          const cur=S[dom.id][tab][ci];
          setOwner(dom.id,ci,OWN[cur===null?0:(OWN.indexOf(cur)+1)%OWN.length]);
        });
      }else if(tab==='compare'){
        cell.className='cell locked';
        const sv=S[dom.id].sara[ci],stv=S[dom.id].stefan[ci];
        if(sv===null||stv===null){
          cell.classList.add('c-empty');
          cell.innerHTML=`<div class="c-own">—</div><div class="c-sub">${sv===null&&stv===null?'neither set':sv===null?'Sara unset':'Stefan unset'}</div>`;
        }else if(sv===stv){
          cell.classList.add('c-match');
          cell.innerHTML=`<div class="c-own">${LBL[sv]}</div><div class="c-desc" style="color:var(--sara)">agree ✓</div>`;
        }else{
          cell.classList.add('c-diff');
          cell.innerHTML=`<div class="c-own">Disagree</div><div class="c-sub" style="color:var(--sara-lt)">Sara: ${LBL[sv]}</div><div class="c-sub" style="color:var(--stefan-lt)">Stefan: ${LBL[stv]}</div>`;
        }
      }else{
        const bv=dom.bench[ci];
        cell.className=`cell o-${bv} locked`;
        cell.innerHTML=`<div class="c-own">${LBL[bv]}</div><div class="c-desc">${DSC[bv]}</div>`;
      }
      cell.title=dom.tips[ci];
      row.appendChild(cell);
    });
    grid.appendChild(row);
  });

  const gw=document.getElementById('gapwrap');
  gw.innerHTML='';
  if(tab==='compare'&&gc>0){
    const gaps=[];
    DOMS.forEach(d=>COLS.forEach((col,i)=>{
      if(S[d.id].sara[i]!==null&&S[d.id].stefan[i]!==null&&S[d.id].sara[i]!==S[d.id].stefan[i])
        gaps.push(`${d.name} → ${col}`);
    }));
    gw.innerHTML=`<div class="gap-box"><div class="gap-title">topics to align on</div><div class="gap-tags">${gaps.map(g=>`<span class="gtag">${g}</span>`).join('')}</div></div>`;
  }
}

(async()=>{
  initLocal();
  await fetchData();
  syncNoteField();
  render();
  startPolling();
})();
</script>
</body>
</html>
